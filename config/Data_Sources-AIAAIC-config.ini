[AIAAIC]
# 输入的原始 AIAAIC Excel 文件
repository_xlsx = data/AIAAIC_Repository.xlsx
# 处理后的 incident/link 结果输出
processed_jsonl = data/aiaaic_processed_data.jsonl
# LLM 补充抓取输出
llm_output_jsonl = download_dir/AIAAIC_output.jsonl
# LLM 补充抓取失败列表
llm_error_jsonl = error/AIAAIC_error.jsonl

[LLM]
# crawl4ai 的 provider 名称
provider = model_provider
# 模型服务 base_url
base_url = model_url
# 模型 API token
api_token = your_api_token
# chunk token 阈值
chunk_token_threshold = 2000
# overlap rate
overlap_rate = 0.1
# 是否启用 chunking
apply_chunking = true
# 输入格式
input_format = markdown
