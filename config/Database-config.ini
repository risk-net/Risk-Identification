[Database]
# PostgreSQL 主机地址。
# 本机数据库通常使用 localhost。
host = localhost
# PostgreSQL 端口，默认通常为 5432。
port = 5432
# 数据库名称。
# 本项目公开版默认使用 ai_risks_db。
database = ai_risks_db
# 数据库用户名。
user = postgres
# 数据库密码。
# 如果本机允许免密连接，可以留空。
password =

[Paths]
# 项目产物根目录。
# 用于保存导出文件、聚类结果、事件视图、中间产物等。
artifacts_root = /path/to/artifacts
# 下载资源根目录。
# 可用于保存 reranker 模型等外部下载资源。
downloads_root = /path/to/downloads
# PostgreSQL 数据目录。
# 主要供空间估算和本地部署说明使用。
# 如果你不自定义 PostgreSQL 数据目录，也可以先保留占位值。
db_data_dir = /path/to/postgres-data

[Sources]
# CommonCrawl News 结果目录。
cc_news_dir = /path/to/cc-news
# OpenNewsArchive 结果目录。
opennews_dir = /path/to/opennews
# AI Incident Database 结果目录。
aiid_dir = /path/to/aiid
# AIAAIC 结果目录。
aiaaic_dir = /path/to/aiaaic
# 文格新闻数据目录。
wenge_dir = /path/to/wenge

[EnglishEventNewsSources]
# 仅保留英文事件新闻的 CommonCrawl News 目录。
# 主要供少数分析/辅助脚本使用，不是基础导入主线必填项。
cc_news_event_only_dir = /path/to/cc-news-event-only
# 仅保留英文事件新闻的 AIID 目录。
aiid_event_only_dir = /path/to/aiid-event-only
# 仅保留英文事件新闻的 AIAAIC 目录。
aiaaic_event_only_dir = /path/to/aiaaic-event-only

[Import]
# 基础导入阶段导入的分类目录（逗号分隔）。
# 通常保留事件与讨论两类，不导入 irrelevant。
classification_dirs = AIrisk_relevant_event,AIrisk_relevant_discussion
