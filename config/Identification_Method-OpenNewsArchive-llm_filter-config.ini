[OpenNewsArchive]
# 仅保留给旧脚本/说明使用；当前统一入口主要读取下面的 AsyncBatch / AsyncOnline 段
BASE_INPUT_DIR = outputs/OpenNewsArchive
BASE_OUTPUT_DIR = outputs/OpenNewsArchive/llm_filter_results
LOG_FILE = logs/OpenNewsArchive/llm_filter.log
CONTENT_LIMIT = 10000

[OpenNewsArchive.API]
OPENAI_BASE_URL = https://ark.cn-beijing.volces.com/api/v3
OPENAI_API_KEY =
ARK_API_KEY =

# 统一入口运行模式：
#   batch  -> 读取 outputs/OpenNewsArchive/<year>/<month>/texts/*.txt
#   online -> 读取 outputs/OpenNewsArchive/<year>/<month>/jsons/*.json
RUN_MODE = batch
ENABLE_MULTI_MODELS = true
ENABLE_MULTI_ENDPOINTS = true
ARK_MODEL_NAME =
ARK_ONLINE_MODEL_NAMES =
ARK_ONLINE_MODEL_NAME =
ARK_ONLINE_MODEL_NAME_2 =
ARK_ONLINE_MODEL_NAME_3 =
ARK_BATCH_MODEL_IDS =
ARK_BATCH_MODEL_ID =
ARK_BATCH_MODEL_ID_2 =
ARK_BATCH_MODEL_ID_3 =

[OpenNewsArchive.AsyncBatch]
# 关键词筛选输出根目录；脚本会自动扫描其中的 <year>/<month>/texts/*.txt
INPUT_ROOT = outputs/OpenNewsArchive
OUTPUT_DIR = outputs/OpenNewsArchive/llm_filter_results/batch
LOG_DIR = logs/OpenNewsArchive/llm_filter/batch
PROMPT_PATH = prompt/Identification_Method-OpenNewsArchive_Datasets-llm_filter-prompt.md
MAX_FILES = 0
TARGET_YEARS =
TARGET_MONTHS =
THREAD_COUNT = 1
PER_THREAD_WORKERS = 100
BATCH_SIZE = 5
CLIENT_TIMEOUT_SECONDS = 7200
MAX_CONCURRENT_REQUESTS = 100
CONTENT_LIMIT = 10000

[OpenNewsArchive.AsyncOnline]
# 关键词筛选输出根目录；脚本会递归扫描其中的 <year>/<month>/jsons/*.json
INPUT_ROOT = outputs/OpenNewsArchive
OUTPUT_DIR = outputs/OpenNewsArchive/llm_filter_results/online
LOG_DIR = logs/OpenNewsArchive/llm_filter/online
PROMPT_PATH = prompt/Identification_Method-OpenNewsArchive_Datasets-llm_filter-prompt.md
MAX_FILES = 0
THREAD_COUNT = 1
PER_THREAD_WORKERS = 25
BATCH_SIZE = 5
CLIENT_TIMEOUT_SECONDS = 7200
CONTENT_LIMIT = 10000
