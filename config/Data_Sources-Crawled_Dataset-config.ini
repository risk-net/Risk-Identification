# This configuration file controls the optional website crawlers in
# `src/Data_Sources/Crawled_Dataset`.
# These crawlers are kept for workflow reference. Real-world execution may
# still require selector updates when target websites change.

[NewsSites]
tencent_news = https://news.qq.com/
thepaper_news = https://www.thepaper.cn
xinhua_news = https://so.news.cn
people_news = https://www.people.com.cn
36kr_news = https://36kr.com
#澎湃新闻

[Keywords]
tencent_news_keywords = example_keyword1,example_keyword2,example_keyword3
thepaper_news_keywords = example_keyword1,example_keyword2,example_keyword3
xinhua_news_keywords = example_keyword1,example_keyword2,example_keyword3
people_news_keywords = example_keyword1,example_keyword2,example_keyword3
36kr_news_keywords = example_keyword1,example_keyword2,example_keyword3
[CrawlerMapping]
tencent_news = crawlers.tencent_news_crawler.scrape_tencent_news
thepaper_news = crawlers.thepaper_news_crawler.scrape_thepaper_news
xinhua_news = crawlers.xinhua_news_crawler.scrape_xinhua_news
people_news = crawlers.people_news_crawler.run_scraper
36kr_news = crawlers.36kr_news_crawler.run_scraper
[MaxPages]
tencent_news_max_pages = 15
thepaper_news_max_pages = 10
xinhua_news_max_pages = 15
people_news_max_pages = 15
36kr_news_max_pages = 15
[Manual]
# 手动模式下是否自动上传
auto_upload = false

[TestMode]
# 是否启用测试模式
enabled = true
# 测试模式下是否自动上传
auto_upload = false
# 指定要测试的站点名称
test_site = thepaper_news

[AutoCrawler]
# 是否启用自动爬取
enabled = false
# 定时执行时间
schedule_time = 02:00
# 定时执行日期
schedule_day = monday

[API]
base_url = https://api.example.com
# Optional upload API endpoint used only when auto_upload = true.

# 可以继续添加更多新闻网站，格式为：网站名称 = URL
# 对于通过下滑加载更多内容的网站，MaxPages 可理解为最大加载次数。
