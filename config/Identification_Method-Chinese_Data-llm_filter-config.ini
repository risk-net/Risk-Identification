[Chinese_Data.API]
OPENAI_BASE_URL = https://ark.cn-beijing.volces.com/api/v3
OPENAI_API_KEY =
ARK_API_KEY =

# 统一入口模式：batch 或 online
RUN_MODE = batch

ENABLE_MULTI_MODELS = true
ENABLE_MULTI_ENDPOINTS = true

ARK_MODEL_NAME =
ARK_ONLINE_MODEL_NAMES =
ARK_ONLINE_MODEL_NAME =
ARK_ONLINE_MODEL_NAME_2 =
ARK_ONLINE_MODEL_NAME_3 =

ARK_BATCH_MODEL_IDS =
ARK_BATCH_MODEL_ID =
ARK_BATCH_MODEL_ID_2 =
ARK_BATCH_MODEL_ID_3 =

[Chinese_Data.AsyncBatch]
INPUT_ROOT = download_dir/cn_risk_news
OUTPUT_DIR_FULL = outputs/Identification_Method-Chinese_Data-llm_filter/batch_full
OUTPUT_DIR_TEST = outputs/Identification_Method-Chinese_Data-llm_filter/batch_test
USE_TEST_OUTPUT_FOR_LIMITED_RUN = true
LOG_DIR = logs/Identification_Method-Chinese_Data-llm_filter/batch
PROMPT_PATH = prompt/Identification_Method-Chinese_Data-llm_filter-prompt.md

MAX_ARTICLES = 0
MAX_ARTICLES_PER_FILE = 0
THREAD_COUNT = 1
PER_THREAD_WORKERS = 50
BATCH_SIZE = 5
CLIENT_TIMEOUT_SECONDS = 3600
MAX_CONCURRENT_REQUESTS = 100

[Chinese_Data.AsyncOnline]
INPUT_ROOT = download_dir/cn_risk_news
OUTPUT_DIR_FULL = outputs/Identification_Method-Chinese_Data-llm_filter/online_full
OUTPUT_DIR_TEST = outputs/Identification_Method-Chinese_Data-llm_filter/online_test
USE_TEST_OUTPUT_FOR_LIMITED_RUN = true
LOG_DIR = logs/Identification_Method-Chinese_Data-llm_filter/online
PROMPT_PATH = prompt/Identification_Method-Chinese_Data-llm_filter-prompt.md

MAX_ARTICLES = 0
MAX_ARTICLES_PER_FILE = 0
THREAD_COUNT = 2
PER_THREAD_WORKERS = 35
BATCH_SIZE = 5
CLIENT_TIMEOUT_SECONDS = 3600
MAX_CONCURRENT_REQUESTS = 100
