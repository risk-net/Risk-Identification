# 配置文件：Identification_Method-Hot_list_word_Dataset-llm_filter-config.ini
# 当前目录仅使用 KeywordFilter / LLMFilter / API 三段配置。

[HotList.KeywordFilter]
KEYWORDS_FILE = keywords/Identification-common-keywords.txt
INPUT_JSON = download_dir/douyin_hotlist.json
RAW_CSV = outputs/Hot_list_word_Dataset/keyword_filter/hotlist_raw.csv
FILTERED_CSV = outputs/Hot_list_word_Dataset/keyword_filter/filtered_hotlist.csv
FUZZ_RATIO_THRESHOLD = 70
LOG_FILE = logs/Hot_list_word_Dataset/keyword_filter.log

[HotList.LLMFilter]
INPUT_CSV = outputs/Hot_list_word_Dataset/keyword_filter/filtered_hotlist.csv
OUTPUT_CSV = outputs/Hot_list_word_Dataset/llm_filter/filtered_hotlist_llm.csv
PROMPT_PATH = prompt/Identification_Method-Hot_list_word_Datasets-llm_filter-prompt.md
BATCH_SIZE = 5
LOG_FILE = logs/Hot_list_word_Dataset/llm_filter.log

[HotList.API]
OPENAI_BASE_URL = https://ark.cn-beijing.volces.com/api/v3
OPENAI_API_KEY =
