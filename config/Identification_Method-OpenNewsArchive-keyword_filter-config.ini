[OpenNewsArchive]

# 原始 OpenNewsArchive JSONL 根目录
# 脚本会递归扫描该目录下所有 *.jsonl 文件

BASE_INPUT_DIR = download_dir/OpenNewsArchive

# 关键词筛选输出根目录
# 输出结构为：
#   outputs/OpenNewsArchive/ai_related_news.jsonl
#   outputs/OpenNewsArchive/<year>/<month>/texts/*.txt
#   outputs/OpenNewsArchive/<year>/<month>/jsons/*.json
BASE_OUTPUT_DIR = outputs/OpenNewsArchive

LOG_FILE = logs/OpenNewsArchive/keyword_filter.log
KEYWORDS_FILE = keywords/Identification-common-keywords.txt

# 筛选后的 AI 相关新闻汇总 JSONL 输出路径
JSONL_FILE = outputs/OpenNewsArchive/ai_related_news.jsonl

PHRASES_FILE = keywords/Identification-common-custom_phrases.txt
